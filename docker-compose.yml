services:
  # The web server. Listens on your machine's port 8080 and forwards
  # PHP requests to the php-fpm container.
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  # The PHP runtime. Built from our Dockerfile so it has pdo_pgsql + Composer.
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  # The PostgreSQL database.
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: giglog
      POSTGRES_USER: giglog
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: