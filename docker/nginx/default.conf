server {
    listen 80;
    server_name localhost;

    # The web root points at public/ — the ONLY folder exposed to the world.
    root /var/www/html/public;
    index index.php;

    location / {
        # Front controller pattern: if the requested file/dir doesn't exist
        # as a real file, hand the request to index.php instead of 404ing.
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        # Forward PHP requests to the php-fpm container.
        # "php" here is the service name from docker-compose.yml,
        # resolved via Docker's internal DNS. 9000 is php-fpm's port.
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}